# Learn more: https://shopify.dev/docs/apps/tools/cli/configuration
#
# application_url + redirect_urls = where THIS Remix app is served (Vercel: app.consentsmanagement.com).
# Set SHOPIFY_APP_URL=https://app.consentsmanagement.com in Vercel env.
#
# They are NOT:
# - The merchant’s store domain (*.myshopify.com) — Shopify never sends OAuth callbacks there.
# - Your marketing site unless that same host/path actually reverse-proxies to this Node app.
#
# OAuth flow: after the merchant approves the app, Shopify redirects their browser to YOUR
# /auth/callback and /auth/shopify/callback routes (see app/shopify.server.ts authPathPrefix).

client_id = "3ef5d1afdfa566bc7e67aeed637daad0"
name = "Intastellar Consents"
application_url = "https://app.consentsmanagement.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

[access_scopes]
scopes = "read_checkout_branding_settings,read_themes"

[auth]
redirect_urls = [
  "https://app.consentsmanagement.com/auth/callback",
  "https://app.consentsmanagement.com/auth/shopify/callback",
]
