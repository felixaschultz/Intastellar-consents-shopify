# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
# Keep in sync with shopify.app.intastellar-consents.toml (same client_id + production URLs).

client_id = "1d66b24cf0d66f6ccf57d9e949b1c7c8"
name = "Intastellar Consents"
application_url = "https://app.consentsmanagement.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[access_scopes]
scopes = "read_checkout_branding_settings,read_themes"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://app.consentsmanagement.com/auth/callback",
  "https://app.consentsmanagement.com/auth/shopify/callback",
]

[webhooks]
api_version = "2026-04"

# Handled by: app/routes/webhooks.app.uninstalled.tsx
[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

# Handled by: app/routes/webhooks.app.scopes_update.tsx
[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "/webhooks/app/scopes_update"

# Mandatory compliance webhooks (App Store)
# @see https://shopify.dev/docs/apps/build/compliance/privacy-law-compliance
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request"]
uri = "/webhooks/customers/data_request"

[[webhooks.subscriptions]]
compliance_topics = ["customers/redact"]
uri = "/webhooks/customers/redact"

[[webhooks.subscriptions]]
compliance_topics = ["shop/redact"]
uri = "/webhooks/shop/redact"
